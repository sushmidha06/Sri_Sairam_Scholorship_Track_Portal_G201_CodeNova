<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scholarship Application Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-gray-50">
    <header class="gradient-bg text-white shadow-lg">
        <div class="container mx-auto px-4 py-6">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <i class="fas fa-graduation-cap text-3xl"></i>
                    <div>
                        <h1 class="text-2xl font-bold">Scholarship Assistant</h1>
                        <p class="text-sm text-indigo-100">AI-Powered Application Helper</p>
                    </div>
                </div>
                <button onclick="toggleProfile()" class="bg-white text-indigo-600 px-4 py-2 rounded-lg font-semibold hover:bg-indigo-50 transition">
                    <i class="fas fa-user mr-2"></i>Profile
                </button>
            </div>
        </div>
    </header>

    <div class="container mx-auto px-4 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2">
                <div class="bg-white rounded-xl shadow-lg overflow-hidden">
                    <div class="bg-gradient-to-r from-indigo-500 to-purple-600 text-white px-6 py-4">
                        <h2 class="text-xl font-semibold">Chat Assistant</h2>
                    </div>
                    <div id="chatContainer" class="chat-container p-6 bg-gray-50"></div>
                    <div class="border-t bg-white p-4">
                        <div class="flex space-x-3">
                            <input type="text" id="messageInput" placeholder="Type your message..." class="flex-1 border rounded-lg px-4 py-3" onkeypress="handleKeyPress(event)">
                            <button onclick="sendMessage()" class="bg-indigo-600 text-white px-6 py-3 rounded-lg">Send</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="space-y-6">
                <div class="bg-white rounded-xl shadow-lg p-6">
                    <h3 class="text-lg font-semibold mb-4">Quick Actions</h3>
                    <div class="space-y-3">
                        <button onclick="showAnalyzeModal()" class="w-full bg-blue-500 text-white px-4 py-3 rounded-lg">Analyze Scholarship</button>
                        <button onclick="showFillFormModal()" class="w-full bg-green-500 text-white px-4 py-3 rounded-lg">Fill Application</button>
                        <button onclick="showEssayModal()" class="w-full bg-purple-500 text-white px-4 py-3 rounded-lg">Generate Essay</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
